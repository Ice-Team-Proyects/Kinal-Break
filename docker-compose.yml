services:

  # Bases de datos

  mongodb:
    image: mongo:7.0
    container_name: kinal-break-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  postgres:
    image: postgres:13
    container_name: kinal-break-postgres
    environment:
      POSTGRES_USER: iceteam
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: kinal_break
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgre_db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  # Auth Service (.NET 8 + PostgreSQL)

  auth-service:
    build:
      context: ./authentication-service
      dockerfile: ../dockerfiles/Dockerfile.auth-service
    container_name: kinal-break-auth-service
    depends_on:
      - postgres
    ports:
      - "5296:5296"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=kinal_break;Username=iceteam;Password=admin;Port=5432"
      JwtSettings__SecretKey: "ThisIs$$ecretKeyForR3$$t@urant1234"
      JwtSettings__Issuer: "AuthService"
      JwtSettings__Audience: "AuthServiceUsers"
    restart: unless-stopped

  # Server Admin (Node + Express + MongoDB)

  server-admin:
    build:
      context: ./server-admin
      dockerfile: ../dockerfiles/Dockerfile.server-admin
    container_name: kinal-break-server-admin
    depends_on:
      - mongodb
      - auth-service
    ports:
      - "3021:3021"
    env_file:
      - ./server-admin/.env
    environment:
      URI_MONGODB: mongodb://mongodb:27017/KinalBreak
    restart: unless-stopped

  # Client Admin (React + Vite, servido con nginx)

  client-admin:
    build:
      context: ./client-admin
      dockerfile: ../dockerfiles/Dockerfile.client-admin
    container_name: kinal-break-client-admin
    depends_on:
      - server-admin
      - auth-service
    ports:
      - "5173:80"
    restart: unless-stopped

  # Client Customer (React + Vite, servido con nginx)

  client-customer:
    build:
      context: ./client-customer
      dockerfile: ../dockerfiles/Dockerfile.client-customer
    container_name: kinal-break-client-customer
    depends_on:
      - server-admin
      - auth-service
    ports:
      - "5174:80"
    restart: unless-stopped

volumes:
  mongo_data:
  postgres_data: