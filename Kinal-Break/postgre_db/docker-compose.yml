version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: kinal-break-postgres
    environment:
      POSTGRES_USER: iceteam
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: Kinal-Break
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stoped

volumes:
  postgres_data: